# RAG recall evaluation cases.
#
# NOTE: This file is a generic template for documentation only.
# The eval harness (rag/eval.py) loads cases from:
#   1. $ORION_OVERLAY_ROOT/config/eval_cases.yaml  (operator)
#   2. rag/eval_cases.yaml                         (in-repo live)
#   3. rag/eval_cases.example.yaml                 (RightsTune reference cases)
#
# I load eval cases from overlay first; rag/eval_cases.example.yaml has reference deployment cases.
#
# Each case must be findable in the Chroma index after running orion-rag-index.
# expect_path_contains: a substring expected in at least one hit's file path or text.

- id: readme_layout
  query: repository layout structure overview
  expect_path_contains: README
  intent: general

- id: sql_validation
  query: data validation SQL script
  expect_path_contains: VALIDATION
  collections: [sql]
  intent: general

# Example cases for additional repos:
#
